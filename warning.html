<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaspadaOjol - WARNING</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #5a0000 0%, #1a0000 100%); 
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        .takeover-screen {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            position: relative;
        }

        .takeover-close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #ff3333;
            color: #000000;
            border: 3px solid #000000;
            font-size: 24px;
            font-weight: 900;
            width: 44px;
            height: 44px;
            border-radius: 6px;
            cursor: pointer;
            z-index: 100000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .takeover-content {
            text-align: center;
            width: 95%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .warning-text {
            color: #ffffff;
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 1.3;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.7);
        }

        .direction-highlight {
            color: #ffcc00; 
            display: inline-block;
            text-shadow: 0 0 10px rgba(255, 204, 0, 0.5);
        }

        .radar-container {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }


        .caution-core {
            position: relative;
            width: 180px;
            height: 180px;
            font-size: 140px; 
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            filter: drop-shadow(0 0 30px rgba(241, 196, 15, 0.8));
            animation: shakeCore 0.4s ease-in-out infinite alternate;
        }

       
        .wave {
            position: absolute;
            width: 180px;
            height: 180px;
            background-color: transparent;
            border: 8px solid #ff1a1a; 
            border-radius: 50%;
            opacity: 0;
            z-index: 1;
            animation: radarPulse 1.5s cubic-bezier(0.1, 0.8, 0.3, 1) infinite;
        }

        .wave2 {
            animation-delay: 0.5s;
        }

        .wave3 {
            animation-delay: 1s;
        }

     
        .action-text {
            color: #ffffff;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-top: 20px;
            text-transform: uppercase;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
            animation: pulseText 0.6s ease infinite alternate;
        }

        /*  ANIMATIONS  */

        /* Outward traveling solid red waves */
        @keyframes radarPulse {
            0% {
                transform: scale(1);
                opacity: 1;
                border-width: 8px;
            }
            100% {
                transform: scale(2.8); 
                opacity: 0;
                border-width: 2px;
            }
        }

        /* Text Flashing */
        @keyframes pulseText {
            0% { opacity: 0.5; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1.02); }
        }

        /* Urgent mini-vibration shake style for the center emoji */
        @keyframes shakeCore {
            0% { transform: rotate(-3deg); }
            100% { transform: rotate(3deg); }
        }
    </style>
</head>
<body>

    <div class="takeover-screen">
        
        <button class="takeover-close-btn" onclick="window.location.href='streetmode.html'" aria-label="Dismiss Warning">
            ✕
        </button>

        <div class="takeover-content">
            <h1 class="warning-text">
                WARNING!<br>VEHICLE APPROACHING FROM <span class="direction-highlight" id="vehicleDirection">BEHIND</span>
            </h1>
            
            <div class="radar-container">
                <div class="wave wave1"></div>
                <div class="wave wave2"></div>
                <div class="wave wave3"></div>
                <div class="caution-core">
                    ⚠️
                </div>
            </div>
            
            <p class="action-text">LOOK AROUND IMMEDIATELY</p>
        </div>
        
    </div>

    <script src="script.js"></script>
</body>
</html>
