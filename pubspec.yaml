name: waspadaojol
description: "WaspadaOjol safety app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # Storage
  shared_preferences: ^2.2.3
  path_provider: ^2.1.4

  # Notifications
  flutter_local_notifications: ^19.0.0

  # AI / ML
  tflite_flutter: ^0.12.1

  # Audio Recording
  record: ^6.1.1

  # Permissions
  permission_handler: ^11.3.1

  # Audio Playback
  audioplayers: ^6.1.0

  # Vibration
  vibration: ^3.1.3

  # YAMNet labels
  csv: ^6.0.0

  # Other
  cupertino_icons: ^1.0.8


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0


flutter:
  uses-material-design: true

  assets:
    - assets/warning.mp3
    - assets/notif.png
    - assets/yamnet.tflite
    - assets/yamnet_class_map.csv